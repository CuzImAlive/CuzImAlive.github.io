<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — Hakkyun Kim</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/theme.js"></script>
  <style>
    .coming-soon {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .coming-soon .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .coming-soon h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .coming-soon p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 360px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .back-link {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .back-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      opacity: 1;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">hk<span>.</span></a>
    <ul class="nav-links">
      <li><a href="/coming-soon/">Research</a></li>
      <li><a href="/coming-soon/">Projects</a></li>
      <li><a href="/coming-soon/">CV</a></li>
      <li><a href="/coming-soon/">Hobbies</a></li>
    </ul>
    <button id="theme-toggle" aria-label="Toggle theme"></button>
  </nav>

  <main>
    <div class="coming-soon">
      <div class="eyebrow">Under Construction</div>
      <h1>Coming Soon</h1>
      <p>This page is still being built. Check back soon.</p>
      <a href="/" class="back-link">← Back to home</a>
    </div>
  </main>

</body>
</html>
